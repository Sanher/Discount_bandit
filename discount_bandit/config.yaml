name: "Discount Bandit"
slug: "discount_bandit"
description: "Price tracker web autoalojado para seguir productos y avisos de bajadas"
version: "0.0.1"
url: "https://github.com/Cybrarist/Discount-Bandit"
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
ingress: false
webui: "http://[HOST]:[PORT:80]"

ports:
  80/tcp: 8099

ports_description:
  80/tcp: "Interfaz web de Discount Bandit"

options:
  public_base_url: ""
  theme_color: "Red"
  cron: "*/5 * * * *"
  exchange_rate_api_key: ""

schema:
  public_base_url: str?
  theme_color: str
  cron: str
  exchange_rate_api_key: password?

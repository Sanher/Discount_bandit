map $http_x_forwarded_host $discount_bandit_forwarded_host {
  default $http_x_forwarded_host;
  "" $http_host;
}

map $http_x_forwarded_proto $discount_bandit_forwarded_proto {
  default $http_x_forwarded_proto;
  "" $scheme;
}

log_format discount_bandit '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'host="$host" ingress="$http_x_ingress_path" '
                          'forwarded_host="$discount_bandit_forwarded_host" '
                          'forwarded_proto="$discount_bandit_forwarded_proto" '
                          'upstream="$upstream_addr"';

server {
  listen 8099;
  listen [::]:8099;
  server_name _;

  access_log /dev/stdout discount_bandit;
  error_log /dev/stderr info;

  allow 127.0.0.1;
  allow ::1;
  allow 172.30.32.2;
  deny all;

  location = /health {
    access_log off;
    default_type text/plain;
    return 200 'ok';
  }

  location / {
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_redirect off;
    proxy_pass http://127.0.0.1:80;

    proxy_set_header Host $discount_bandit_forwarded_host;
    proxy_set_header X-Forwarded-Host $discount_bandit_forwarded_host;
    proxy_set_header X-Forwarded-Proto $discount_bandit_forwarded_proto;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Ingress-Path $http_x_ingress_path;
    proxy_set_header Connection "";
  }
}
